name: Auto_Deploy

on:
  push:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/git-action-test:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/git-action-test:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 로컬 compose.yaml EC2로 전송
      - name: Copy compose.yaml to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "compose.yaml"
          target: "/home/${{ secrets.USERNAME }}"

      #  EC2에 접속하여 Docker image pull
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            # 1. 최신 이미지 가져오기
            docker-compose pull
            
            # 2. 기존 컨테이너 중지 및 삭제 (이미 떠있지 않아도 에러 안 나게 처리)
            docker-compose down || true
            
            # 3. 새 컨테이너 백그라운드 실행
            docker-compose up -d
            
            # 4. 안 쓰는 이미지 정리 (용량 확보)
            docker image prune -f