name: Auto_Deploy

on:
  push:
    branches: [ "develop" ] # 개발 브랜치에 푸시될 때 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/git-action-test:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/git-action-test:latest

  deploy:
    needs: build # 빌드가 성공해야 배포 시작
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            # 서버 접속 후 실행할 명령어들
            docker-compose pull
            docker-compose up -d
            docker image prune -f # 오래된 이미지 정리 (용량 확보)